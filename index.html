<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Platform TD Prototype</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: "Segoe UI", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      margin-left: -7px;
      margin-top: -7px;
      pointer-events: none;
      z-index: 3;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: #1f2430;
    }

    #crosshair::before {
      left: 6px;
      top: 0;
      width: 2px;
      height: 14px;
    }

    #crosshair::after {
      left: 0;
      top: 6px;
      width: 14px;
      height: 2px;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(4, 8, 20, 0.62);
      color: #e8edff;
      font-size: 16px;
      letter-spacing: 0.02em;
      z-index: 2;
      pointer-events: none;
    }

    #overlay.hidden,
    .hidden {
      display: none !important;
    }

    .upgrade-btn {
      background: #1e3a5f;
      border: 1px solid #5da1f5;
      color: white;
      padding: 15px 25px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s;
    }

    .upgrade-btn:hover,
    .upgrade-btn.hover {
      background: #2b5182;
      transform: translateY(-2px);
    }


    #hud {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 4;
      color: #e9f1ff;
      font-size: 14px;
      background: rgba(14, 23, 38, 0.6);
      border: 1px solid rgba(155, 202, 255, 0.25);
      border-radius: 8px;
      padding: 8px 10px;
      backdrop-filter: blur(3px);
    }

    #jetpack-ui {
      margin-top: 8px;
      min-width: 170px;
    }

    #jetpack-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    #jetpack-fuel-bar {
      margin-top: 5px;
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(197, 228, 255, 0.4);
      background: rgba(9, 15, 27, 0.65);
    }

    #jetpack-fuel-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #58f3ff 0%, #5fb6ff 100%);
      transition: width 0.08s linear;
    }

    #mobile-ui {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      display: none;
    }

    .touch-pad {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1px solid rgba(205, 226, 255, 0.35);
      background: rgba(18, 30, 50, 0.35);
      pointer-events: auto;
      touch-action: none;
    }

    #move-pad {
      left: 20px;
      bottom: 20px;
    }

    #move-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 52px;
      height: 52px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(139, 197, 255, 0.65);
      border: 1px solid rgba(225, 240, 255, 0.6);
    }

    #look-pad {
      right: 20px;
      bottom: 20px;
      width: 160px;
      height: 160px;
      border-radius: 20px;
    }

    #mobile-buttons {
      position: absolute;
      right: 20px;
      top: 20px;
      display: grid;
      grid-template-columns: repeat(2, minmax(70px, 1fr));
      gap: 8px;
      width: 170px;
      pointer-events: auto;
    }

    #mobile-buttons button {
      appearance: none;
      border: 1px solid rgba(181, 215, 255, 0.42);
      border-radius: 8px;
      background: rgba(23, 40, 65, 0.75);
      color: #e8f1ff;
      font-size: 12px;
      line-height: 1.2;
      padding: 10px 8px;
      touch-action: none;
    }

    #mobile-buttons button:active {
      background: rgba(49, 84, 128, 0.9);
    }

    @media (hover: none),
    (pointer: coarse) {
      #mobile-ui {
        display: block;
      }

      #overlay {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <div id="hud">
    <div id="build-status">Combat mode</div>
    <div id="jetpack-ui">
      <div id="jetpack-header">
        <span>Jetpack Fuel</span>
        <span id="jetpack-fuel-percent">100%</span>
      </div>
      <div id="jetpack-fuel-bar">
        <div id="jetpack-fuel-fill"></div>
      </div>
    </div>
  </div>

  <div id="bottom-bar"
    style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(14,23,38,0.8); padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(155, 202, 255, 0.25); color: #e9f1ff; font-size: 16px; z-index: 4; display: flex; gap: 20px; backdrop-filter: blur(3px);">
    <div>Wave: <span id="wave-counter">0</span></div>
    <div>Towers Available: <span id="towers-available">0</span></div>
  </div>

  <style>
    .inv-item {
      width: 90px;
      height: 90px;
      background: rgba(14, 23, 38, 0.8);
      border: 2px solid rgba(155, 202, 255, 0.2);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      backdrop-filter: blur(8px);
    }

    .inv-item:hover {
      background: rgba(28, 46, 76, 0.9);
      border-color: #5085c8;
      transform: scale(1.08);
      box-shadow: 0 0 20px rgba(80, 133, 200, 0.4);
    }

    .inv-item.active {
      border-color: #6bf4ad;
      box-shadow: 0 0 15px rgba(107, 244, 173, 0.3);
    }

    .cube-icon {
      width: 56px;
      height: 56px;
      border-radius: 6px;
      background:
        linear-gradient(145deg, rgba(138, 255, 246, 0.95), rgba(76, 117, 153, 0.95));
      border: 2px solid rgba(182, 255, 246, 0.85);
      box-shadow:
        0 0 15px rgba(116, 255, 222, 0.45),
        inset 0 0 20px rgba(17, 39, 53, 0.45);
      position: relative;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .cube-icon::before {
      content: "";
      position: absolute;
      inset: 21px -5px;
      border-radius: 999px;
      border: 2px solid rgba(148, 255, 245, 0.95);
      box-shadow: 0 0 10px rgba(124, 255, 245, 0.8);
    }

    .inv-item:hover .cube-icon {
      transform: scale(1.08);
      box-shadow:
        0 0 18px rgba(116, 255, 222, 0.65),
        inset 0 0 24px rgba(17, 39, 53, 0.55);
    }
  </style>

  <div id="inventory-ui"
    style="position: fixed; left: 30px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 4;">
    <div id="inv-basic" class="inv-item">
      <div class="cube-icon"></div>
      <div
        style="position: absolute; bottom: 6px; right: 10px; font-weight: bold; font-size: 14px; color: #6bf4ad; text-shadow: 0 0 4px rgba(0,0,0,0.8);">
        [1]</div>
    </div>
  </div>

  <div id="upgrade-menu" class="hidden"
    style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(4,8,20,0.85); z-index: 10; pointer-events: auto;">
    <div
      style="background: rgba(14,23,38,0.95); border: 1px solid #5085c8; border-radius: 12px; padding: 30px; text-align: center; color: white; display: flex; flex-direction: column; gap: 20px;">
      <h2 style="margin: 0; font-size: 24px;">Wave Completed!</h2>
      <p style="margin: 0; opacity: 0.8;">Select an upgrade for the next wave:</p>
      <div id="upgrade-options" style="display: flex; gap: 15px; justify-content: center;"></div>
    </div>
  </div>

  <style>
    #virtual-cursor {
      position: fixed;
      width: 14px;
      height: 14px;
      background: #fff;
      border: 2px solid #000;
      border-radius: 50%;
      z-index: 10000;
      pointer-events: none;
      transform: translate(-50%, -50%);
      display: none;
    }

    #virtual-cursor.visible {
      display: block;
    }
  </style>
  <div id="virtual-cursor"></div>
  <div id="crosshair" aria-hidden="true"></div>
  <div id="overlay">Click to play | WASD to move | ESC to unlock</div>
  <div id="mobile-ui" aria-hidden="true">
    <div id="move-pad" class="touch-pad">
      <div id="move-knob"></div>
    </div>
    <div id="look-pad" class="touch-pad"></div>
    <div id="mobile-buttons">
      <button id="btn-jump" type="button">Jump</button>
      <button id="btn-shoot" type="button">Shoot</button>
      <button id="btn-build" type="button">Laser Tower</button>
      <button id="btn-place" type="button">Place</button>
      <button id="btn-cancel" type="button">Cancel</button>
    </div>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three/build/three.module.js",
        "three/addons/": "./vendor/three/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./main.js"></script>
</body>

</html>
