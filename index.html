<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Platform TD Prototype</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070f;
      font-family: "Segoe UI", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      margin-left: -7px;
      margin-top: -7px;
      pointer-events: none;
      z-index: 3;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: #ffffff;
    }

    #crosshair::before {
      left: 6px;
      top: 0;
      width: 2px;
      height: 14px;
    }

    #crosshair::after {
      left: 0;
      top: 6px;
      width: 14px;
      height: 2px;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(4, 8, 20, 0.62);
      color: #e8edff;
      font-size: 16px;
      letter-spacing: 0.02em;
      z-index: 2;
      pointer-events: none;
    }

    #overlay.hidden,
    .hidden {
      display: none !important;
    }

    .upgrade-btn {
      background: #1e3a5f;
      border: 1px solid #5da1f5;
      color: white;
      padding: 15px 25px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s;
    }

    .upgrade-btn:hover,
    .upgrade-btn.hover {
      background: #2b5182;
      transform: translateY(-2px);
    }


    #hud {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 4;
      color: #e9f1ff;
      font-size: 14px;
      background: rgba(14, 23, 38, 0.6);
      border: 1px solid rgba(155, 202, 255, 0.25);
      border-radius: 8px;
      padding: 8px 10px;
      backdrop-filter: blur(3px);
    }

    #mobile-ui {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      display: none;
    }

    .touch-pad {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1px solid rgba(205, 226, 255, 0.35);
      background: rgba(18, 30, 50, 0.35);
      pointer-events: auto;
      touch-action: none;
    }

    #move-pad {
      left: 20px;
      bottom: 20px;
    }

    #move-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 52px;
      height: 52px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(139, 197, 255, 0.65);
      border: 1px solid rgba(225, 240, 255, 0.6);
    }

    #look-pad {
      right: 20px;
      bottom: 20px;
      width: 160px;
      height: 160px;
      border-radius: 20px;
    }

    #mobile-buttons {
      position: absolute;
      right: 20px;
      top: 20px;
      display: grid;
      grid-template-columns: repeat(2, minmax(70px, 1fr));
      gap: 8px;
      width: 170px;
      pointer-events: auto;
    }

    #mobile-buttons button {
      appearance: none;
      border: 1px solid rgba(181, 215, 255, 0.42);
      border-radius: 8px;
      background: rgba(23, 40, 65, 0.75);
      color: #e8f1ff;
      font-size: 12px;
      line-height: 1.2;
      padding: 10px 8px;
      touch-action: none;
    }

    #mobile-buttons button:active {
      background: rgba(49, 84, 128, 0.9);
    }

    @media (hover: none),
    (pointer: coarse) {
      #mobile-ui {
        display: block;
      }

      #overlay {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <div id="hud">
    <div id="build-status">Combat mode</div>
  </div>

  <div id="bottom-bar"
    style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(14,23,38,0.8); padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(155, 202, 255, 0.25); color: #e9f1ff; font-size: 16px; z-index: 4; display: flex; gap: 20px; backdrop-filter: blur(3px);">
    <div>Wave: <span id="wave-counter">0</span></div>
    <div>Towers Available: <span id="towers-available">0</span></div>
  </div>

  <div id="upgrade-menu" class="hidden"
    style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(4,8,20,0.85); z-index: 10; pointer-events: auto;">
    <div
      style="background: rgba(14,23,38,0.95); border: 1px solid #5085c8; border-radius: 12px; padding: 30px; text-align: center; color: white; display: flex; flex-direction: column; gap: 20px;">
      <h2 style="margin: 0; font-size: 24px;">Wave Completed!</h2>
      <p style="margin: 0; opacity: 0.8;">Select an upgrade for the next wave:</p>
      <div id="upgrade-options" style="display: flex; gap: 15px; justify-content: center;"></div>
    </div>
  </div>

  <style>
    #virtual-cursor {
      position: fixed;
      width: 14px;
      height: 14px;
      background: #fff;
      border: 2px solid #000;
      border-radius: 50%;
      z-index: 10000;
      pointer-events: none;
      transform: translate(-50%, -50%);
      display: none;
    }

    #virtual-cursor.visible {
      display: block;
    }
  </style>
  <div id="virtual-cursor"></div>
  <div id="crosshair" aria-hidden="true"></div>
  <div id="overlay">Click to play | WASD to move | ESC to unlock</div>
  <div id="mobile-ui" aria-hidden="true">
    <div id="move-pad" class="touch-pad">
      <div id="move-knob"></div>
    </div>
    <div id="look-pad" class="touch-pad"></div>
    <div id="mobile-buttons">
      <button id="btn-jump" type="button">Jump</button>
      <button id="btn-shoot" type="button">Shoot</button>
      <button id="btn-build" type="button">Basic Tower</button>
      <button id="btn-build-mortar" type="button">Mortar Tower</button>
      <button id="btn-place" type="button">Place</button>
      <button id="btn-cancel" type="button">Cancel</button>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>

</html>
